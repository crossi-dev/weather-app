<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="https://crossi-dev.github.io/carlos" class="back-link">← Portfolio</a>

  <main id="card">
    <h1>Weather App</h1>

    <div id="search-form">
      <input type="text" id="city-input" placeholder="Enter city name" />
      <button id="search-btn">Search</button>
    </div>

    <section id="results" style="display:none">
      <h2 id="city-name"></h2>
      <p id="temperature"></p>
      <p id="description"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
